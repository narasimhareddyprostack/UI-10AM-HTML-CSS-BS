<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyWebsite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a class="logo" href="#">
        <span class="logo-mark">M</span>
        <span class="logo-text">MyWebsite</span>
      </a>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="#" class="nav-link active">Home</a></li>
        <li><a href="#" class="nav-link">About</a></li>
        <li><a href="#" class="nav-link">Services</a></li>
        <li><a href="#" class="nav-link">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Demo page body -->
  <main class="hero">
    <h1>Welcome to <em>MyWebsite</em></h1>
    <p>Scroll down to see the sticky navbar in action.</p>
    <div class="spacer"></div>
  </main>

  <script>
    const btn = document.getElementById('hamburger');
    const menu = document.getElementById('nav-links');
    btn.addEventListener('click', () => {
      btn.classList.toggle('open');
      menu.classList.toggle('open');
    });
    // close menu on link click
    menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      btn.classList.remove('open');
      menu.classList.remove('open');
    }));
  </script>
</body>
</html>
