<html>
    <head>
        <link rel="stylesheet" href="./styles.css">
        <title>Bootstrap - Template</title>
        <style>
            .box{
                border: 2px blue solid;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
                <a href="./index.html" class="navbar-brand">Logo</a>
                <div class="ml-auto">
                    <ul class="navbar-nav">
                        <li><a class="nav-link" href="./index.html">Home</a></li>
                        <li><a class="nav-link" href="./products.html">Products</a></li>
                        <li><a class="nav-link" href="./login.html">Login</a></li>
                        <li><a class="nav-link" href="./contact.html">Contact</a></li>
                    </ul>
                </div>
            </nav>
        </header>
        <div>
            <h3>Contact Page</h3>

        </div>
        <div class="container">
            <div class="row">
                <div class="col-6">
                    <div class="fancy-title title-dotted-border">
	                    <h3>Send us an Email</h3>
                    </div>
                    <!--  Contact Form -->
                    <form action="/contact">
                        <div class="row">
                            <div class="col-4">
                                <div class="form-group">
                                    <label >Name:</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div>
                            <div class="col-4">
                                 <div class="form-group">
                                    <label >Email:</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div>
                            <div class="col-4">
                                 <div class="form-group">
                                    <label >Mobile:</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-8">
                                 <div class="form-group">
                                    <label >Subject:</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div> 
                            <div class="col-4">
                                <div class="form-group">
                                    <label >Services:</label>
                                    <select class="form-control">
                                        <option >--Pls Select--</option>
                                        <option >Web Development</option>
                                        <option >Cloud Services</option>
                                        <option >App Maintaintance</option>
                                    </select>
                                </div>
                            </div> 
                        </div>
                        <div class="row">
                            <div class="col">
                                <div class="form-group">
                                    <label >Message</label>
                                    <textarea rows="4" class="form-control"></textarea>
                                </div>
                                
                            </div> 
                        </div>
                        <input type="submit" value="Submit Comment" class="btn btn-warning">
                    </form>
                </div>
                <div class="col-6">
                    <!-- Google Map -->
                     <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d23693.398533925752!2d77.700996!3d12.962415000000002!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae10d5b2786a23%3A0xb08461de6796aef8!2sGreet%20Labs%20Private%20Limited!5e1!3m2!1sen!2sus!4v1771997308623!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
        <footer></footer>
    </body>
</html>
